<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebean Studio 2 - Standalone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;500;600;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ECF0F3;
            --text-primary: #4A5568;
            --text-secondary: #718096;
            --shadow-light: #FFFFFF;
            --shadow-dark: #D1D9E6;
            --primary-color: #EF4444;
            --secondary-color: #68D391;
            --accent-color: #A78BFA;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Neumorphism Utilities */
        .neu-flat {
            background: var(--bg-color);
            box-shadow: 18px 18px 30px var(--shadow-dark), -18px -18px 30px var(--shadow-light);
            border-radius: 24px;
        }

        .neu-pressed {
            background: var(--bg-color);
            box-shadow: inset 8px 8px 16px var(--shadow-dark), inset -8px -8px 16px var(--shadow-light);
            border-radius: 16px;
        }

        .neu-concave {
            background: linear-gradient(145deg, #d4d8db, #fdffff);
            box-shadow: 18px 18px 30px var(--shadow-dark), -18px -18px 30px var(--shadow-light);
            border-radius: 24px;
        }

        /* Claymorphism Utilities */
        .clay-card {
            background: var(--bg-color);
            border-radius: 32px;
            box-shadow: 35px 35px 70px var(--shadow-dark), -35px -35px 70px var(--shadow-light);
            padding: 2rem;
        }

        .clay-btn-primary {
            background: var(--primary-color);
            color: white;
            border-radius: 50px;
            box-shadow: 8px 8px 16px rgba(166, 116, 58, 0.2), -8px -8px 16px rgba(255, 255, 255, 0.5), inset 2px 2px 4px rgba(255, 255, 255, 0.3), inset -2px -2px 4px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
        }

        .clay-btn-primary:active {
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.1), inset -4px -4px 8px rgba(255, 255, 255, 0.2);
            transform: scale(0.98);
        }

        .clay-btn-secondary {
            background: var(--bg-color);
            color: var(--text-primary);
            border-radius: 50px;
            box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            transition: all 0.2s ease;
        }

        .clay-btn-secondary:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            transform: scale(0.98);
        }

        .clay-input {
            background: var(--bg-color);
            border-radius: 16px;
            box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
            border: none;
            outline: none;
            padding: 1rem;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .clay-input:focus {
            box-shadow: inset 8px 8px 16px var(--shadow-dark), inset -8px -8px 16px var(--shadow-light), 0 0 0 2px var(--primary-color);
        }

        .neon-emboss-red {
            color: #EF4444;
            font-weight: 900;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.6);
            filter: drop-shadow(-1px -1px 1px rgba(0, 0, 0, 0.3));
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fadeIn {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color); 
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E0; 
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #A0AEC0; 
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="mb-12 flex flex-col items-center">
            <div class="neu-flat px-8 py-4 flex items-center gap-4 mb-4">
                <h1 class="text-4xl font-black tracking-tighter text-center text-[var(--text-primary)]">
                    Firebean
                    <span class="font-light opacity-80 ml-2">Studio</span>
                    <span class="ml-2 neon-emboss-red">2</span>
                </h1>
            </div>
            <p class="text-[10px] text-[var(--text-secondary)] uppercase tracking-widest font-bold opacity-60">Standalone Edition</p>
        </header>

        <!-- Main Content Area -->
        <main id="main-content" class="w-full">
            <!-- Content will be injected here -->
        </main>

        <!-- Footer -->
        <footer class="mt-12 py-8 border-t border-[var(--shadow-dark)] flex flex-col items-center gap-4">
            <div class="max-w-3xl w-full neu-flat p-6 flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex items-center gap-3">
                    <div class="p-3 rounded-full neu-pressed">
                        <i data-lucide="settings-2" class="w-5 h-5 text-[var(--text-secondary)]"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-bold text-[var(--text-primary)] tracking-tight">AI Model Engine</h3>
                        <p class="text-[10px] text-[var(--text-secondary)] uppercase tracking-widest font-medium">System Configuration</p>
                    </div>
                </div>

                <div class="flex flex-wrap items-center justify-center gap-8">
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-widest ml-1">Image Generation</label>
                        <div class="flex neu-pressed p-1 rounded-xl">
                            <button onclick="setModel('gemini-2.5-flash-image')" id="model-lite-btn" class="px-4 py-2 rounded-lg text-xs font-bold transition-all">Lite 2.5</button>
                            <button onclick="setModel('gemini-3.1-flash-image-preview')" id="model-nano-btn" class="px-4 py-2 rounded-lg text-xs font-bold transition-all">Nano Banana 2</button>
                        </div>
                    </div>
                </div>

                <div class="hidden lg:block text-right">
                    <span class="text-[10px] font-mono text-[var(--text-secondary)]">v2.5.0-STANDALONE</span>
                </div>
            </div>
        </footer>
    </div>

    <!-- API Key Modal (Fallback if placeholder not replaced) -->
    <div id="api-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="clay-card max-w-md w-full p-8 animate-fadeIn">
            <div class="neu-pressed p-6 rounded-full mb-6 mx-auto w-fit">
                <i data-lucide="key" class="w-12 h-12 text-[var(--primary-color)]"></i>
            </div>
            <h2 class="text-2xl font-bold mb-4 text-center">API Key Required</h2>
            <p class="text-sm text-[var(--text-secondary)] mb-6 text-center">The placeholder {{GEMINI_API_KEY}} has not been replaced. Please enter your Gemini API Key to continue.</p>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase tracking-widest font-bold mb-2 block">Gemini API Key</label>
                    <input type="password" id="api-key-input" class="w-full clay-input" placeholder="Enter your API key...">
                </div>
                <div class="flex gap-4 pt-4">
                    <button onclick="saveApiKey()" class="w-full clay-btn-primary py-4 font-bold text-lg">Save & Continue</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const PLACEHOLDER_KEY = '{{GEMINI_API_KEY}}';
        let API_KEY = PLACEHOLDER_KEY;

        // Check if placeholder was replaced by a tool
        if (API_KEY === '{{' + 'GEMINI_API_KEY' + '}}') {
            API_KEY = localStorage.getItem('STANDALONE_GEMINI_API_KEY') || '';
        }

        // --- Constants ---
        const AppState = { IDLE: 'IDLE', LOADING: 'LOADING', SUCCESS: 'SUCCESS', ERROR: 'ERROR' };
        const GenerationMode = { TEXT_TO_IMAGE: 'Text to Image', IMAGE_TO_PROMPT: 'Image to Prompt' };
        const Styles = [
            { value: 'none', label: 'No Style' },
            { value: 'funny', label: 'Funny / Comedic' },
            { value: 'cinematic', label: 'Cinematic' },
            { value: 'cartoon', label: 'Cartoon' },
            { value: 'surreal', label: 'Surreal' },
            { value: 'vintage', label: 'Vintage' },
            { value: 'cyberpunk', label: 'Cyberpunk' }
        ];

        // --- State ---
        let state = {
            appState: AppState.IDLE,
            mode: GenerationMode.TEXT_TO_IMAGE,
            prompt: '',
            style: 'none',
            cameraAnglePrompt: '',
            imageModel: 'gemini-2.5-flash-image',
            resultUrl: null,
            imageCandidates: [],
            errorMessage: null,
            referenceImages: [],
            sourceImage: null,
            isDescribing: false
        };

        // --- Initialization ---
        function init() {
            render();
            if (!API_KEY || API_KEY === '{{' + 'GEMINI_API_KEY' + '}}') {
                document.getElementById('api-modal').classList.remove('hidden');
                document.getElementById('api-modal').classList.add('flex');
            }
        }

        function saveApiKey() {
            const input = document.getElementById('api-key-input');
            const key = input.value.trim();
            if (key) {
                API_KEY = key;
                localStorage.setItem('STANDALONE_GEMINI_API_KEY', key);
                document.getElementById('api-modal').classList.add('hidden');
                document.getElementById('api-modal').classList.remove('flex');
                render();
            }
        }

        // --- Actions ---
        function setMode(mode) {
            state.mode = mode;
            state.appState = AppState.IDLE;
            state.resultUrl = null;
            state.imageCandidates = [];
            render();
        }

        function setModel(model) {
            state.imageModel = model;
            render();
        }

        async function handleFileUpload(files, isReference = true) {
            const file = files[0];
            if (!file) return;
            const base64 = await fileToBase64(file);
            if (isReference) {
                state.referenceImages.push({ file, base64 });
            } else {
                state.sourceImage = { file, base64 };
            }
            render();
        }

        function removeImage(index, isReference = true) {
            if (isReference) {
                state.referenceImages.splice(index, 1);
            } else {
                state.sourceImage = null;
            }
            render();
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function describeImage() {
            if (!state.sourceImage || !API_KEY) return;
            state.isDescribing = true;
            render();
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { inline_data: { mime_type: state.sourceImage.file.type, data: state.sourceImage.base64 } },
                                { text: "Describe this image in high detail for image generation purposes. Include subject, setting, artistic style, lighting, colors, and camera angle. Output only the description." }
                            ]
                        }]
                    })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                state.prompt = data.candidates[0].content.parts[0].text;
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                state.isDescribing = false;
                render();
            }
        }

        async function generate() {
            if (!API_KEY) return;
            state.appState = AppState.LOADING;
            render();
            try {
                let finalPrompt = state.prompt;
                if (state.style !== 'none') finalPrompt += ` in a ${state.style} style`;
                if (state.cameraAnglePrompt) finalPrompt += `, ${state.cameraAnglePrompt}`;

                const parts = state.referenceImages.map(img => ({
                    inline_data: { mime_type: img.file.type, data: img.base64 }
                }));
                parts.push({ text: finalPrompt });

                // Generate 3 candidates in parallel
                const requests = [1, 2, 3].map(() => fetch(`https://generativelanguage.googleapis.com/v1beta/models/${state.imageModel}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts }],
                        generationConfig: {
                            image_config: {
                                aspect_ratio: "1:1",
                                ...(state.imageModel.includes('3.1') ? { image_size: "1K" } : {})
                            }
                        }
                    })
                }));

                const responses = await Promise.all(requests);
                const results = await Promise.all(responses.map(r => r.json()));
                const candidates = [];
                results.forEach(data => {
                    if (data.error) throw new Error(data.error.message);
                    const part = data.candidates?.[0]?.content?.parts?.find(p => p.inline_data);
                    if (part) candidates.push(`data:${part.inline_data.mime_type};base64,${part.inline_data.data}`);
                });

                if (candidates.length === 0) throw new Error('No images generated.');
                state.imageCandidates = candidates;
                state.resultUrl = candidates[0];
                state.appState = AppState.SUCCESS;
            } catch (err) {
                state.errorMessage = err.message;
                state.appState = AppState.ERROR;
            } finally {
                render();
            }
        }

        // --- Rendering ---
        function render() {
            const main = document.getElementById('main-content');
            updateFooterStyles();

            if (state.appState === AppState.LOADING) {
                main.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 animate-fadeIn">
                        <div class="w-24 h-24 neu-flat flex items-center justify-center mb-8 relative">
                            <div class="absolute inset-2 rounded-full border-4 border-[var(--shadow-dark)]"></div>
                            <div class="absolute inset-2 rounded-full border-4 border-t-[var(--primary-color)] animate-spin"></div>
                            <i data-lucide="wand-2" class="w-8 h-8 text-[var(--primary-color)]"></i>
                        </div>
                        <h2 class="text-2xl font-bold mb-2">Generating Masterpiece</h2>
                        <p class="text-[var(--text-secondary)] animate-pulse">Consulting the creative spirits...</p>
                    </div>
                `;
            } else if (state.appState === AppState.SUCCESS) {
                main.innerHTML = `
                    <div class="animate-fadeIn space-y-8">
                        <div class="clay-card flex flex-col items-center">
                            <div class="flex w-full justify-between items-center mb-8">
                                <button onclick="setMode(state.mode)" class="clay-btn-secondary flex items-center gap-2 px-4 py-2 text-xs font-bold uppercase tracking-wider">
                                    <i data-lucide="plus" class="w-3 h-3"></i> New
                                </button>
                                <div class="flex items-center gap-2">
                                    <div class="w-2 h-2 rounded-full bg-[var(--primary-color)] animate-pulse"></div>
                                    <span class="text-xs font-mono text-[var(--text-secondary)]">IMAGE GENERATED</span>
                                </div>
                            </div>
                            <div class="relative w-full max-w-lg aspect-square rounded-3xl overflow-hidden neu-pressed p-2 mb-8">
                                <img src="${state.resultUrl}" class="w-full h-full object-contain rounded-2xl">
                            </div>
                            ${state.imageCandidates.length > 1 ? `
                                <div class="flex gap-4 mb-8">
                                    ${state.imageCandidates.map(url => `
                                        <button onclick="state.resultUrl='${url}';render()" class="w-20 h-20 rounded-2xl overflow-hidden transition-all ${state.resultUrl === url ? 'neu-flat scale-110 ring-2 ring-[var(--primary-color)]' : 'neu-pressed opacity-60'}">
                                            <img src="${url}" class="w-full h-full object-cover">
                                        </button>
                                    `).join('')}
                                </div>
                            ` : ''}
                            <div class="flex flex-wrap justify-center gap-4 w-full">
                                <button onclick="generate()" class="flex-1 clay-btn-secondary py-4 font-bold flex items-center justify-center gap-2">
                                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Retry
                                </button>
                                <button onclick="setMode(state.mode)" class="flex-1 clay-btn-secondary py-4 font-bold flex items-center justify-center gap-2">
                                    <i data-lucide="pencil" class="w-4 h-4"></i> Edit
                                </button>
                                <a href="${state.resultUrl}" download="firebean-image.png" class="flex-[2] clay-btn-primary py-4 font-bold flex items-center justify-center gap-2 text-center">
                                    <i data-lucide="download" class="w-4 h-4"></i> Download PNG
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.appState === AppState.ERROR) {
                main.innerHTML = `
                    <div class="clay-card max-w-lg mx-auto text-center animate-fadeIn">
                        <h2 class="text-2xl font-bold text-red-500 mb-4">System Glitch</h2>
                        <p class="text-gray-600 mb-8">${state.errorMessage}</p>
                        <button onclick="setMode(state.mode)" class="clay-btn-primary px-8 py-3 font-bold bg-red-400">Reboot System</button>
                    </div>
                `;
            } else {
                main.innerHTML = `
                    <div class="animate-fadeIn space-y-8">
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="setMode('${GenerationMode.TEXT_TO_IMAGE}')" class="flex items-center justify-center gap-3 py-4 rounded-2xl text-base font-black uppercase tracking-widest transition-all ${state.mode === GenerationMode.TEXT_TO_IMAGE ? 'clay-btn-primary' : 'clay-btn-secondary'}">
                                <i data-lucide="image" class="w-6 h-6"></i> Generate Image
                            </button>
                            <button onclick="setMode('${GenerationMode.IMAGE_TO_PROMPT}')" class="flex items-center justify-center gap-3 py-4 rounded-2xl text-base font-black uppercase tracking-widest transition-all ${state.mode === GenerationMode.IMAGE_TO_PROMPT ? 'clay-btn-primary' : 'clay-btn-secondary'}">
                                <i data-lucide="scan-eye" class="w-6 h-6"></i> Image to Prompt
                            </button>
                        </div>
                        <div class="clay-card">
                            ${state.mode === GenerationMode.IMAGE_TO_PROMPT ? renderImageToPrompt() : renderTextToImage()}
                            <div class="mt-8">
                                <button onclick="generate()" class="w-full py-4 font-bold text-lg tracking-widest uppercase clay-btn-primary hover:-translate-y-1">Generate Image</button>
                            </div>
                        </div>
                    </div>
                `;
                initCameraControl();
            }
            lucide.createIcons();
        }

        function renderTextToImage() {
            return `
                <div class="space-y-6">
                    <div class="p-6 rounded-3xl neu-concave">
                        <label class="text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-widest block mb-4 text-center">Reference Images (Optional)</label>
                        <div class="grid grid-cols-3 md:grid-cols-4 gap-4">
                            ${state.referenceImages.map((img, i) => `
                                <div class="relative group h-24 neu-flat p-1">
                                    <img src="data:${img.file.type};base64,${img.base64}" class="w-full h-full object-cover rounded-lg">
                                    <button onclick="removeImage(${i})" class="absolute top-1 right-1 w-6 h-6 bg-red-500 rounded-full text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                        <i data-lucide="x" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            `).join('')}
                            <button onclick="document.getElementById('ref-upload').click()" class="h-24 neu-pressed hover:neu-flat rounded-xl flex flex-col items-center justify-center text-[var(--text-secondary)] transition-all">
                                <i data-lucide="plus" class="w-6 h-6 mb-1"></i>
                                <span class="text-[10px] font-bold uppercase">Add Photo</span>
                                <input type="file" id="ref-upload" class="hidden" accept="image/*" onchange="handleFileUpload(this.files)">
                            </button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-widest font-bold text-[var(--text-secondary)] ml-1">Image Description</label>
                        <textarea oninput="state.prompt=this.value" class="w-full clay-input min-h-[120px] text-lg" placeholder="Describe the image you want to generate...">${state.prompt}</textarea>
                    </div>
                    <div class="p-6 rounded-3xl neu-concave">
                        <div id="camera-container"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="flex flex-col">
                            <label class="text-[10px] uppercase tracking-widest font-bold mb-2 ml-1 text-[var(--text-secondary)]">Visual Style</label>
                            <select onchange="state.style=this.value" class="clay-input appearance-none">
                                ${Styles.map(s => `<option value="${s.value}" ${state.style === s.value ? 'selected' : ''}>${s.label}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderImageToPrompt() {
            return `
                <div class="space-y-6">
                    <div class="p-6 rounded-3xl neu-concave">
                        <label class="text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-widest block mb-4">Image to Analyze</label>
                        <div class="flex items-center gap-8">
                            <div class="w-48 h-32 relative">
                                ${state.sourceImage ? `
                                    <div class="w-full h-full neu-flat p-1 relative group">
                                        <img src="data:${state.sourceImage.file.type};base64,${state.sourceImage.base64}" class="w-full h-full object-cover rounded-lg">
                                        <button onclick="removeImage(0, false)" class="absolute top-1 right-1 w-6 h-6 bg-red-500 rounded-full text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                            <i data-lucide="x" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                ` : `
                                    <button onclick="document.getElementById('source-upload').click()" class="w-full h-full neu-pressed hover:neu-flat rounded-xl flex flex-col items-center justify-center text-[var(--text-secondary)] transition-all">
                                        <i data-lucide="plus" class="w-6 h-6 mb-1"></i>
                                        <span class="text-[10px] font-bold uppercase">Upload</span>
                                        <input type="file" id="source-upload" class="hidden" accept="image/*" onchange="handleFileUpload(this.files, false)">
                                    </button>
                                `}
                            </div>
                            <div class="flex-1">
                                <button onclick="describeImage()" ${state.isDescribing || !state.sourceImage ? 'disabled' : ''} class="w-full py-4 clay-btn-primary font-bold text-sm tracking-widest uppercase flex items-center justify-center gap-3 disabled:opacity-50">
                                    <i data-lucide="sparkles" class="${state.isDescribing ? 'animate-spin' : ''} w-5 h-5"></i>
                                    ${state.isDescribing ? 'Analyzing...' : 'Describe Image'}
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-widest font-bold text-[var(--text-secondary)] ml-1">AI Analysis Result</label>
                        <textarea readonly class="w-full clay-input min-h-[120px] text-lg opacity-80" placeholder="The AI description will appear here...">${state.prompt}</textarea>
                    </div>
                </div>
            `;
        }

        function updateFooterStyles() {
            const liteBtn = document.getElementById('model-lite-btn');
            const nanoBtn = document.getElementById('model-nano-btn');
            if (!liteBtn || !nanoBtn) return;
            
            const activeClass = 'bg-[var(--bg-color)] text-[var(--primary-color)] shadow-[5px_5px_10px_var(--shadow-dark),-5px_-5px_10px_var(--shadow-light)]';
            const inactiveClass = 'text-[var(--text-secondary)] hover:text-[var(--text-primary)]';
            
            liteBtn.className = `px-4 py-2 rounded-lg text-xs font-bold transition-all ${state.imageModel === 'gemini-2.5-flash-image' ? activeClass : inactiveClass}`;
            nanoBtn.className = `px-4 py-2 rounded-lg text-xs font-bold transition-all ${state.imageModel === 'gemini-3.1-flash-image-preview' ? activeClass : inactiveClass}`;
        }

        // --- Camera Control ---
        let cameraRotation = { x: 0, y: 0 };
        function initCameraControl() {
            const container = document.getElementById('camera-container');
            if (!container) return;
            container.innerHTML = `
                <div class="flex flex-col gap-2 w-full">
                    <div class="flex justify-between items-end mb-1 px-1">
                        <label class="text-[10px] uppercase tracking-widest font-bold text-[var(--text-secondary)]">Camera Control</label>
                        <span class="text-[9px] text-[var(--text-secondary)] italic">Drag to rotate</span>
                    </div>
                    <div class="flex gap-4 h-64">
                        <div class="relative flex-grow neu-pressed overflow-hidden">
                            <canvas id="camera-canvas" class="w-full h-full cursor-move"></canvas>
                            <div id="angle-label" class="absolute top-3 left-3 neu-flat px-3 py-1 text-[10px] font-mono opacity-80">Front View</div>
                        </div>
                        <div class="flex flex-col gap-2 w-20">
                            <button onclick="resetCamera()" class="clay-btn-secondary py-2 text-[8px] font-bold uppercase">Reset</button>
                            <button onclick="setCameraPreset(0, 0)" class="clay-btn-secondary py-2 text-[8px] font-bold uppercase">Front</button>
                            <button onclick="setCameraPreset(0, 90)" class="clay-btn-secondary py-2 text-[8px] font-bold uppercase">Right</button>
                            <button onclick="setCameraPreset(0, 180)" class="clay-btn-secondary py-2 text-[8px] font-bold uppercase">Back</button>
                            <button onclick="setCameraPreset(-90, 0)" class="clay-btn-secondary py-2 text-[8px] font-bold uppercase">Top</button>
                        </div>
                    </div>
                </div>
            `;
            setupCameraCanvas();
        }

        function setupCameraCanvas() {
            const canvas = document.getElementById('camera-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let isDragging = false;
            let lastPos = { x: 0, y: 0 };

            const draw = () => {
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * window.devicePixelRatio;
                canvas.height = rect.height * window.devicePixelRatio;
                ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
                
                const w = rect.width, h = rect.height, cx = w/2, cy = h/2, scale = Math.min(w, h) * 0.25;
                ctx.clearRect(0, 0, w, h);
                
                const radX = cameraRotation.x * Math.PI / 180;
                const radY = cameraRotation.y * Math.PI / 180;

                const project = (v) => {
                    let x = v.x * Math.cos(radY) - v.z * Math.sin(radY);
                    let z = v.x * Math.sin(radY) + v.z * Math.cos(radY);
                    let y = v.y * Math.cos(radX) - z * Math.sin(radX);
                    z = v.y * Math.sin(radX) + z * Math.cos(radX);
                    return { x: cx + x * scale, y: cy + y * scale, z };
                };

                // Simple character geometry
                const faces = [
                    { v: [{x:-0.6,y:-1.5,z:0.6}, {x:0.6,y:-1.5,z:0.6}, {x:0,y:0,z:0}], c: '#CBD5E0' }, // Front
                    { v: [{x:0.6,y:-1.5,z:0.6}, {x:0.6,y:-1.5,z:-0.6}, {x:0,y:0,z:0}], c: '#A0AEC0' }, // Right
                    { v: [{x:0.6,y:-1.5,z:-0.6}, {x:-0.6,y:-1.5,z:-0.6}, {x:0,y:0,z:0}], c: '#A0AEC0' }, // Back
                    { v: [{x:-0.6,y:-1.5,z:-0.6}, {x:-0.6,y:-1.5,z:0.6}, {x:0,y:0,z:0}], c: '#CBD5E0' }  // Left
                ];

                faces.map(f => {
                    const vs = f.v.map(project);
                    const avgZ = vs.reduce((s, v) => s + v.z, 0) / vs.length;
                    return { vs, c: f.c, avgZ };
                }).sort((a, b) => a.avgZ - b.avgZ).forEach(f => {
                    ctx.beginPath();
                    ctx.moveTo(f.vs[0].x, f.vs[0].y);
                    f.vs.forEach(v => ctx.lineTo(v.x, v.y));
                    ctx.closePath();
                    ctx.fillStyle = f.c;
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                    ctx.stroke();
                });

                updateAngleLabel();
            };

            canvas.onmousedown = (e) => { isDragging = true; lastPos = { x: e.clientX, y: e.clientY }; };
            window.onmousemove = (e) => {
                if (!isDragging) return;
                cameraRotation.y += (e.clientX - lastPos.x) * 0.5;
                cameraRotation.x = Math.max(-90, Math.min(90, cameraRotation.x + (e.clientY - lastPos.y) * 0.5));
                lastPos = { x: e.clientX, y: e.clientY };
                draw();
            };
            window.onmouseup = () => isDragging = false;
            
            window.resetCamera = () => { cameraRotation = {x:0, y:0}; draw(); };
            window.setCameraPreset = (x, y) => { cameraRotation = {x, y}; draw(); };
            
            function updateAngleLabel() {
                let p = cameraRotation.x, y = (cameraRotation.y % 360 + 360) % 360;
                if (y > 180) y -= 360;
                let h = "Eye-level", s = "Front";
                if (p < -35) h = "Overhead"; else if (p < -10) h = "High angle";
                else if (p > 35) h = "Worm's eye"; else if (p > 10) h = "Low angle";
                if (y > 45 && y < 135) s = "Right Profile"; else if (y >= 135 || y <= -135) s = "Back View"; else if (y < -45 && y > -135) s = "Left Profile";
                document.getElementById('angle-label').innerText = `${h}, ${s}`;
                state.cameraAnglePrompt = `camera angle: ${h} view from the ${s}`;
            }
            draw();
        }

        init();
    </script>
</body>
</html>
